<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Valhalla Web Login</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.24/dist/full.min.css" rel="stylesheet" type="text/css" />
  <link rel="stylesheet" href="/static/web-ui.css" />
</head>
<body class="valhalla-bg min-h-screen p-4">
  <main class="mx-auto flex min-h-[calc(100vh-2rem)] max-w-md items-center justify-center">
    <section class="card w-full border border-base-300 bg-base-100/90 shadow-2xl backdrop-blur">
      <div class="card-body">
        <div class="badge badge-primary badge-outline">Valhalla Admin Portal</div>
        <h1 class="card-title text-3xl">Welcome back</h1>
        <p class="text-base-content/70">Sign in to manage users, quotas, and subscriptions.</p>

        <form id="login-form" class="mt-2 space-y-4">
          <label class="form-control w-full">
            <div class="label"><span class="label-text">Username</span></div>
            <input id="username" class="input input-bordered w-full" autocomplete="username" required />
          </label>
          <label class="form-control w-full">
            <div class="label"><span class="label-text">Password</span></div>
            <input id="password" class="input input-bordered w-full" type="password" autocomplete="current-password" required />
          </label>
          <p id="error" class="hidden text-sm text-error"></p>
          <button id="submit" type="submit" class="btn btn-primary w-full">Sign in</button>
        </form>
      </div>
    </section>
  </main>

  <script>
    const form = document.getElementById('login-form');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const errorNode = document.getElementById('error');
    const submitButton = document.getElementById('submit');

    function setError(message) {
      if (!message) {
        errorNode.textContent = '';
        errorNode.classList.add('hidden');
        return;
      }
      errorNode.textContent = message;
      errorNode.classList.remove('hidden');
    }

    async function redirectIfLoggedIn() {
      try {
        const res = await fetch('/api/v1/web/me', { credentials: 'same-origin' });
        if (res.ok) window.location.replace('/web/users');
      } catch (_) {
        // Ignore connectivity checks and allow manual sign in.
      }
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      setError('');
      submitButton.disabled = true;
      submitButton.textContent = 'Signing in…';

      try {
        const res = await fetch('/api/v1/web/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({
            username: usernameInput.value,
            password: passwordInput.value,
          }),
        });

        if (res.ok) {
          window.location.replace('/web/users');
          return;
        }

        setError(res.status === 429 ? 'Too many attempts. Please try again later.' : 'Invalid credentials.');
      } catch (_) {
        setError('Unable to login right now.');
      } finally {
        submitButton.disabled = false;
        submitButton.textContent = 'Sign in';
      }
    });

    void redirectIfLoggedIn();
  </script>
</body>
</html>
