version: "3.9"

services:
  mysql:
    image: docker.io/library/mysql:8.0
    container_name: valhalla-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - valhalla-mysql-data:/var/lib/mysql

  app:
    build: .
    image: ${IMAGE:-ghcr.io/rh8888/valhallabot:latest}
    container_name: valhalla-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      ADMIN_IDS: ${ADMIN_IDS}
      MYSQL_HOST: ${MYSQL_HOST}
      MYSQL_PORT: ${MYSQL_PORT}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      FLASK_HOST: ${FLASK_HOST}
      FLASK_PORT: ${FLASK_PORT}
      SSL_CERT_PATH: ${SSL_CERT_PATH}
      SSL_KEY_PATH: ${SSL_KEY_PATH}
      WORKERS: ${WORKERS}
      AGENT_TOKEN_ENCRYPTION_KEY: ${AGENT_TOKEN_ENCRYPTION_KEY}
      AGENT_TOKEN_ENCRYPTION_OLD_KEYS: ${AGENT_TOKEN_ENCRYPTION_OLD_KEYS}
      SERVICE: app
    ports:
      - "${FLASK_PORT:-5000}:${FLASK_PORT:-5000}"
    volumes:
      - ./certs:/app/certs:ro

  bot:
    build: .
    image: ${IMAGE:-ghcr.io/rh8888/valhallabot:latest}
    container_name: valhalla-bot
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      ADMIN_IDS: ${ADMIN_IDS}
      MYSQL_HOST: ${MYSQL_HOST}
      MYSQL_PORT: ${MYSQL_PORT}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      USAGE_SYNC_INTERVAL: ${USAGE_SYNC_INTERVAL}
      AGENT_TOKEN_ENCRYPTION_KEY: ${AGENT_TOKEN_ENCRYPTION_KEY}
      AGENT_TOKEN_ENCRYPTION_OLD_KEYS: ${AGENT_TOKEN_ENCRYPTION_OLD_KEYS}
      SERVICE: bot


  certbot-renew:
    image: docker.io/certbot/certbot:latest
    container_name: valhalla-certbot-renew
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
    environment:
      SSL_DOMAIN: ${SSL_DOMAIN}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:-}
      APP_CONTAINER_NAME: valhalla-app
      CERTBOT_RENEW_INTERVAL_SECONDS: ${CERTBOT_RENEW_INTERVAL_SECONDS:-43200}
    network_mode: host
    volumes:
      - ./certs:/etc/letsencrypt
      - ./scripts/certbot-renew.sh:/usr/local/bin/certbot-renew.sh:ro
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: ["/usr/local/bin/certbot-renew.sh"]

  usage:
    build: .
    image: ${IMAGE:-ghcr.io/rh8888/valhallabot:latest}
    container_name: valhalla-usage
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      ADMIN_IDS: ${ADMIN_IDS}
      BOT_TOKEN: ${BOT_TOKEN}
      MYSQL_HOST: ${MYSQL_HOST}
      MYSQL_PORT: ${MYSQL_PORT}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      USAGE_SYNC_INTERVAL: ${USAGE_SYNC_INTERVAL}
      AGENT_TOKEN_ENCRYPTION_KEY: ${AGENT_TOKEN_ENCRYPTION_KEY}
      AGENT_TOKEN_ENCRYPTION_OLD_KEYS: ${AGENT_TOKEN_ENCRYPTION_OLD_KEYS}
      SERVICE: scripts.usage_sync

volumes:
  valhalla-mysql-data:
